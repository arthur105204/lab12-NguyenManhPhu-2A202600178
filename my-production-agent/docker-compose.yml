services:
  agent:
    build: .
    env_file:
      - .env
    environment:
      - PORT=8000
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - "8000"
    restart: unless-stopped
    networks:
      - app_net

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - app_net

  nginx:
    image: nginx:alpine
    ports:
      - "18080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - agent
    restart: unless-stopped
    networks:
      - app_net

volumes:
  redis_data:

networks:
  app_net:
    driver: bridge
